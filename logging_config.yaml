version: 1
formatters:
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(funcName)s:%(lineno)d - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: detailed
    stream: ext://sys.stdout

  file_user:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/users.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  file_destination:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/destinations.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

  file_tour:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: detailed
    filename: logs/tours.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf8

loggers:
  user_service:
    level: INFO
    handlers: [console, file_user]
    propagate: no

  destination_service:
    level: INFO
    handlers: [console, file_destination]
    propagate: no

  tour_service:
    level: INFO
    handlers: [console, file_tour]
    propagate: no

  api:
    level: INFO
    handlers: [console]
    propagate: no

root:
  level: INFO
  handlers: [console]