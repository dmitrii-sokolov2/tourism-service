<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Глобус</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Контейнер для глобуса на весь экран */
        #globe-container {
            position: absolute;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
        }

        /* Все элементы поверх глобуса */
        #info, .auth-buttons, #selected-info, .controls-hint, #loading {
            position: absolute;
            z-index: 100;
            pointer-events: none;
        }

        /* Кнопки должны быть кликабельны */
        .auth-buttons {
            pointer-events: auto;
        }

        .auth-buttons button {
            pointer-events: auto;
            cursor: pointer;
        }

        #info {
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #444;
            backdrop-filter: blur(5px);
        }

        #info h2 {
            margin: 0 0 10px 0;
            color: #ffaa00;
        }

        .auth-buttons {
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .auth-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        #login-btn {
            background: #ffaa00;
            color: black;
        }

        #register-btn {
            background: #4CAF50;
            color: white;
        }

        #selected-info {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffaa00;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #ffaa00;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .controls-hint {
            bottom: 20px;
            right: 20px;
            color: #aaa;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        #loading {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка глобуса...</div>

    <!-- КНОПКИ -->
    <div class="auth-buttons">
        <a href="/static/login.html">
            <button id="login-btn">🔐 Войти</button>
        </a>
        <a href="/static/register.html">
            <button id="register-btn">📝 Регистрация</button>
        </a>
    </div>

    <div id="info">
        <h2>🌍 Туристический 3D глобус</h2>
        <p id="cities-count">Загрузка городов...</p>
    </div>

    <div id="selected-info"></div>

    <div class="controls-hint">
        🖱️ Вращение: зажми левую кнопку мыши | Масштаб: колёсико
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ ГЛОБУСА -->
    <div id="globe-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.28.0/dist/globe.gl.min.js"></script>

    <script>
        function createGlobe(cities) {
            if (typeof Globe === 'undefined') {
                console.error('❌ Ошибка: библиотека Globe не загрузилась');
                return;
            }

            console.log('✅ Библиотека Globe загружена!');
            console.log('🌆 Загружено городов:', cities.length);

            document.getElementById('cities-count').innerHTML = 
                `📍 Доступные направления: ${cities.map(c => c.name).join(', ')}`;

            // СОЗДАЁМ ГЛОБУС В КОНТЕЙНЕРЕ - ПРАВИЛЬНЫЙ СИНТАКСИС
            const globe = Globe()  // Сначала создаём объект
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .pointsData(cities)
                .pointColor(() => '#ff4444')
                .pointAltitude(0.05)
                .pointRadius(0.8)
                .pointLabel(d => `
                    <div style="background:rgba(0,0,0,0.9); color:white; padding:15px; border-radius:8px; border-left:4px solid #ff4444;">
                        <b>${d.name}</b><br>${d.country}<br>🏨 ${d.tours || 0} туров<br>💰 от ${d.price || '35 000'} ₽
                    </div>
                `)
                .onPointClick(d => {
                    const infoDiv = document.getElementById('selected-info');
                    infoDiv.style.display = 'block';
                    infoDiv.innerHTML = `✅ ${d.name}, ${d.country} | Туров: ${d.tours || 0}`;
                    setTimeout(() => infoDiv.style.display = 'none', 5000);
                });

            // МОНТИРУЕМ В КОНТЕЙНЕР
            globe(document.getElementById('globe-container'));

            window.addEventListener('resize', () => {
                globe.width(window.innerWidth);
                globe.height(window.innerHeight);
            });

            console.log('🌍 Глобус создан!');
            document.getElementById('loading').style.display = 'none';
        }

        fetch('/api/destinations/coordinates')
            .then(res => res.json())
            .then(data => {
                console.log('📦 Данные из БД:', data);
                createGlobe(data.length ? data : [
                    { lat: 48.8566, lng: 2.3522, name: 'Париж', country: 'Франция', tours: 5, price: '45 000' },
                    { lat: 35.6762, lng: 139.6503, name: 'Токио', country: 'Япония', tours: 3, price: '89 000' },
                    { lat: -8.3405, lng: 115.0920, name: 'Бали', country: 'Индонезия', tours: 8, price: '35 000' }
                ]);
            })
            .catch(err => {
                console.error('❌ Ошибка:', err);
                document.getElementById('loading').innerHTML = '❌ Ошибка загрузки';
                setTimeout(() => createGlobe([
                    { lat: 48.8566, lng: 2.3522, name: 'Париж', country: 'Франция', tours: 5, price: '45 000' },
                    { lat: 35.6762, lng: 139.6503, name: 'Токио', country: 'Япония', tours: 3, price: '89 000' },
                    { lat: -8.3405, lng: 115.0920, name: 'Бали', country: 'Индонезия', tours: 8, price: '35 000' }
                ]), 1000);
            });
    </script>
</body>
</html>
