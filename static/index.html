<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Глобус</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 100;
            border: 1px solid #444;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #info h2 {
            margin: 0 0 10px 0;
            color: #ffaa00;
        }
        #selected-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #ffaa00;
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid #ffaa00;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
            display: none;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(255,170,0,0.3);
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: #aaa;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            z-index: 1000;
        }
        #loading.error {
            background: rgba(255,0,0,0.8);
        }
    </style>
</head>
<body>
    <div id="loading">Загрузка глобуса...</div>
    
    <div id="info">
        <h2>🌍 Туристический 3D глобус</h2>
        <p id="cities-count">Загрузка городов...</p>
    </div>

    <div id="selected-info"></div>
    
    <div class="controls-hint">
        🖱️ Вращение: зажми левую кнопку мыши | Масштаб: колёсико
    </div>

    <!-- Подключаем библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.28.0/dist/globe.gl.min.js"></script>

    <script>
        // Функция создания глобуса
        function createGlobe(cities) {
            if (typeof Globe === 'undefined') {
                console.error('❌ Ошибка: библиотека Globe не загрузилась');
                document.getElementById('loading').innerHTML = '❌ Ошибка загрузки библиотеки';
                return;
            }

            console.log('✅ Библиотека Globe загружена!');
            console.log('🌆 Загружено городов:', cities.length);
            
            // Обновляем счётчик городов
            document.getElementById('cities-count').innerHTML = 
                `📍 Доступные направления: ${cities.map(c => c.name).join(', ')}`;

            // Создаём глобус
            const globe = Globe()
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .pointsData(cities)
                .pointColor(() => '#ff4444')
                .pointAltitude(0.05)
                .pointRadius(0.8)
                .pointLabel(d => `
                    <div style="background:rgba(0,0,0,0.9); color:white; padding:15px; border-radius:8px; border-left:4px solid #ff4444; box-shadow:0 0 20px rgba(0,0,0,0.8);">
                        <b style="font-size:18px;">${d.name}</b><br>
                        <span style="color:#aaa;">${d.country}</span><br>
                        <span style="color:#ffaa00;">🏨 ${d.tours || 0} туров</span><br>
                        <span style="color:#4caf50;">💰 от ${d.price || '35 000'} ₽</span>
                    </div>
                `)
                .onPointClick(d => {
                    const infoDiv = document.getElementById('selected-info');
                    infoDiv.style.display = 'block';
                    infoDiv.innerHTML = `✅ ${d.name}, ${d.country} | Туров: ${d.tours || 0}`;
                    
                    setTimeout(() => {
                        infoDiv.style.display = 'none';
                    }, 5000);
                });

            // Добавляем глобус на страницу
            globe(document.body);
            
            // Адаптация под размер окна
            window.addEventListener('resize', () => {
                globe.width(window.innerWidth);
                globe.height(window.innerHeight);
            });
            
            console.log('🌍 Глобус создан!');
            
            // Убираем загрузку
            const loadingEl = document.getElementById('loading');
            if (loadingEl) loadingEl.style.display = 'none';
        }

        // ЗАГРУЖАЕМ ДАННЫЕ ИЗ ТВОЕЙ БАЗЫ
        fetch('/api/destinations/coordinates')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ошибка сервера: ' + response.status);
                }
                return response.json();
            })
            .then(data => {
                console.log('📦 Получены данные из БД:', data);
                
                if (data.length === 0) {
                    // Если данных нет, используем тестовые
                    console.warn('⚠️ База пуста, используем тестовые данные');
                    const testCities = [
                        { lat: 48.8566, lng: 2.3522, name: 'Париж', country: 'Франция', tours: 5, price: '45 000' },
                        { lat: 35.6762, lng: 139.6503, name: 'Токио', country: 'Япония', tours: 3, price: '89 000' },
                        { lat: -8.3405, lng: 115.0920, name: 'Бали', country: 'Индонезия', tours: 8, price: '35 000' }
                    ];
                    createGlobe(testCities);
                } else {
                    createGlobe(data);
                }
            })
            .catch(error => {
                console.error('❌ Ошибка загрузки:', error);
                document.getElementById('loading').innerHTML = '❌ Ошибка загрузки данных. Используем тестовые...';
                
                // Если ошибка, показываем тестовые города
                const testCities = [
                    { lat: 48.8566, lng: 2.3522, name: 'Париж', country: 'Франция', tours: 5, price: '45 000' },
                    { lat: 35.6762, lng: 139.6503, name: 'Токио', country: 'Япония', tours: 3, price: '89 000' },
                    { lat: -8.3405, lng: 115.0920, name: 'Бали', country: 'Индонезия', tours: 8, price: '35 000' }
                ];
                setTimeout(() => createGlobe(testCities), 1000);
            });
    </script>
</body>
</html>
